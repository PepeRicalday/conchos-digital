<!doctype html>
<!-- lang="es": la interfaz está en español. Antes decía "en", lo que hacía que
     Chrome ofreciera "traducir" y convirtiera términos técnicos como "S/D"
     (Sin Dato) en "Dakota del Sur", "balance"→"saldo", etc. translate="no"
     desactiva la traducción automática del navegador para toda la app. -->
<html lang="es" translate="no">

<head>
  <meta charset="UTF-8" />
  <meta name="google" content="notranslate" />
  <link rel="icon" type="image/png" href="/logos/logo-srl.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conchos Digital v%APP_VERSION%</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
