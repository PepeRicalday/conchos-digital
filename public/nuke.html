<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizando SICA...</title>
    <style>
        body {
            background: #020617;
            color: white;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }

        .loader {
            border: 4px solid #1e293b;
            border-top: 4px solid #ea580c;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="loader"></div>
    <div style="text-align: center; padding: 20px;">
        <h2 style="margin: 0 0 10px 0;">Limpiando Caché...</h2>
        <p style="color: #94a3b8; font-size: 14px;">Estamos forzando la descarga de la nueva versión.<br>Serás
            redirigido en un momento.</p>
        <p id="paso" style="color: #64748b; font-size: 12px; font-family: monospace; margin-top: 12px;">Iniciando…</p>
    </div>
    <script>
        /**
         * Purga total y ESPERADA antes de redirigir.
         *
         * La versión anterior lanzaba las operaciones asíncronas (.then) y
         * redirigía con un setTimeout fijo de 2 s sin esperarlas: en un
         * dispositivo lento la navegación ocurría ANTES de terminar de borrar,
         * el SW viejo sobrevivía y el equipo volvía a quedar anclado. Ahora se
         * espera cada paso con await y el timeout solo actúa como tope máximo.
         */
        (async function () {
            const log = (m) => { console.log(m); const el = document.getElementById('paso'); if (el) el.textContent = m; };

            // Preservar la sesión de Supabase: borrarla obliga a reingresar
            // credenciales en campo, donde el operador puede no tenerlas.
            const auth = [];
            try {
                for (let i = 0; i < localStorage.length; i++) {
                    const k = localStorage.key(i);
                    if (k && (k.startsWith('sb-') || k.indexOf('supabase.auth') !== -1)) {
                        auth.push([k, localStorage.getItem(k)]);
                    }
                }
            } catch (e) { /* modo privado */ }

            // 1. Desregistrar TODOS los service workers (antes que nada: si
            //    sobrevive uno, puede volver a poblar las cachés que borremos).
            try {
                if ('serviceWorker' in navigator) {
                    log('Desregistrando service workers…');
                    const regs = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(regs.map((r) => r.unregister()));
                }
            } catch (e) { console.warn('SW:', e); }

            // 2. Borrar TODAS las cachés
            try {
                if ('caches' in window) {
                    log('Borrando cachés…');
                    const names = await caches.keys();
                    await Promise.all(names.map((n) => caches.delete(n)));
                }
            } catch (e) { console.warn('caches:', e); }

            // 3. Limpiar almacenamiento (restaurando la sesión)
            try {
                log('Limpiando almacenamiento…');
                localStorage.clear();
                sessionStorage.clear();
                for (const [k, v] of auth) if (v !== null) localStorage.setItem(k, v);
            } catch (e) { console.warn('storage:', e); }

            // 4. IndexedDB (Dexie). Safari/iOS no soporta databases() — se
            //    ignora silenciosamente ahí; no es crítico para el anclaje.
            try {
                if (window.indexedDB && indexedDB.databases) {
                    log('Limpiando base local…');
                    const dbs = await indexedDB.databases();
                    await Promise.all(dbs.map((db) => db.name
                        ? new Promise((res) => { const r = indexedDB.deleteDatabase(db.name); r.onsuccess = r.onerror = r.onblocked = () => res(); })
                        : Promise.resolve()));
                }
            } catch (e) { console.warn('idb:', e); }

            // 5. Redirigir con cache-busting sólo cuando TODO terminó.
            log('Cargando versión nueva…');
            window.location.replace(window.location.origin + '/?nuke=' + Date.now());
        })();
    </script>
</body>

</html>
