<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizando SICA...</title>
    <style>
        body {
            background: #020617;
            color: white;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }

        .loader {
            border: 4px solid #1e293b;
            border-top: 4px solid #ea580c;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="loader"></div>
    <div style="text-align: center; padding: 20px;">
        <h2 style="margin: 0 0 10px 0;">Limpiando Caché...</h2>
        <p style="color: #94a3b8; font-size: 14px;">Estamos forzando la descarga de la nueva versión.<br>Serás
            redirigido en un momento.</p>
        <p id="paso" style="color: #64748b; font-size: 12px; font-family: monospace; margin-top: 12px;">Iniciando…</p>
    </div>
    <script>
        /**
         * Purga total y ESPERADA antes de redirigir.
         *
         * La versión anterior lanzaba las operaciones asíncronas (.then) y
         * redirigía con un setTimeout fijo de 2 s sin esperarlas: en un
         * dispositivo lento la navegación ocurría ANTES de terminar de borrar,
         * el SW viejo sobrevivía y el equipo volvía a quedar anclado. Ahora se
         * espera cada paso con await y el timeout solo actúa como tope máximo.
         */
        (function () {
            var salida = false;
            var log = function (m) {
                console.log(m);
                var el = document.getElementById('paso');
                if (el) el.textContent = m;
            };

            var irAlSitio = function (motivo) {
                if (salida) return;              // una sola navegación
                salida = true;
                console.log('Redirigiendo (' + motivo + ')');
                window.location.replace(window.location.origin + '/?nuke=' + Date.now());
            };

            // RED DE SEGURIDAD: pase lo que pase, a los 8 s se navega igual.
            // Si un paso queda colgado (caso típico: deleteDatabase bloqueado
            // por una conexión Dexie abierta en otra pestaña de iPadOS), la
            // purga que SÍ alcanzó a correr ya sirve — lo esencial es
            // desregistrar el SW y borrar cachés, que van primero.
            setTimeout(function () { irAlSitio('tope de seguridad'); }, 8000);

            // Tope individual por paso: ninguna promesa puede colgar la cadena.
            var conTope = function (promesa, ms, etiqueta) {
                return Promise.race([
                    Promise.resolve(promesa).catch(function (e) { console.warn(etiqueta, e); }),
                    new Promise(function (res) { setTimeout(function () { console.warn(etiqueta + ': tope alcanzado'); res(); }, ms); })
                ]);
            };

            (async function () {
                // Preservar la sesión de Supabase: borrarla obliga a reingresar
                // credenciales en campo, donde el operador puede no tenerlas.
                var auth = [];
                try {
                    for (var i = 0; i < localStorage.length; i++) {
                        var k = localStorage.key(i);
                        if (k && (k.indexOf('sb-') === 0 || k.indexOf('supabase.auth') !== -1)) {
                            auth.push([k, localStorage.getItem(k)]);
                        }
                    }
                } catch (e) { /* modo privado */ }

                // 1. Desregistrar TODOS los service workers. Va primero: si
                //    sobrevive uno, puede repoblar las cachés que borremos.
                if ('serviceWorker' in navigator) {
                    log('Desregistrando service workers…');
                    await conTope((async function () {
                        var regs = await navigator.serviceWorker.getRegistrations();
                        await Promise.all(regs.map(function (r) { return r.unregister(); }));
                    })(), 3000, 'SW');
                }

                // 2. Borrar TODAS las cachés — el paso decisivo del anclaje.
                if ('caches' in window) {
                    log('Borrando cachés…');
                    await conTope((async function () {
                        var names = await caches.keys();
                        await Promise.all(names.map(function (n) { return caches.delete(n); }));
                    })(), 3000, 'caches');
                }

                // 3. Almacenamiento (restaurando la sesión). Es síncrono.
                try {
                    log('Limpiando almacenamiento…');
                    localStorage.clear();
                    sessionStorage.clear();
                    for (var j = 0; j < auth.length; j++) {
                        if (auth[j][1] !== null) localStorage.setItem(auth[j][0], auth[j][1]);
                    }
                    // Candado anti-bucle de VersionGuard: si esta purga manual
                    // NO alcanza a limpiar lo que tenía anclado al dispositivo
                    // (típico en PWA standalone de iPadOS, donde el proceso
                    // WKWebView puede tener su propia copia del bundle fuera del
                    // alcance de caches.delete()), el guardián que monte después
                    // no debe disparar OTRA purga de inmediato — sería el mismo
                    // bucle, ahora iniciado desde aquí. Se le agota el contador
                    // de intentos para que, si vuelve a ver versión "menor", se
                    // rinda y deje operar en vez de recargar otra vez.
                    localStorage.setItem('sica_vg_intentos', '99');
                } catch (e) { console.warn('storage:', e); }

                // 4. IndexedDB. deleteDatabase() puede quedarse en `blocked`
                //    indefinidamente si Dexie tiene una conexión abierta, así
                //    que va AL FINAL y con tope corto: no borrarla no impide
                //    recibir la versión nueva.
                try {
                    if (window.indexedDB && indexedDB.databases) {
                        log('Limpiando base local…');
                        await conTope((async function () {
                            var dbs = await indexedDB.databases();
                            await Promise.all(dbs.map(function (db) {
                                if (!db.name) return Promise.resolve();
                                return new Promise(function (res) {
                                    var r = indexedDB.deleteDatabase(db.name);
                                    r.onsuccess = r.onerror = r.onblocked = function () { res(); };
                                });
                            }));
                        })(), 2000, 'idb');
                    }
                } catch (e) { console.warn('idb:', e); }

                log('Cargando versión nueva…');
                irAlSitio('purga completa');
            })().catch(function (e) {
                console.error('nuke:', e);
                irAlSitio('error');          // ni un throw impide salir
            });
        })();
    </script>
</body>

</html>
