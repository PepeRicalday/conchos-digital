<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Actualizando SICA...</title>
    <style>
        body {
            background: #020617;
            color: white;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }

        .loader {
            border: 4px solid #1e293b;
            border-top: 4px solid #ea580c;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="loader"></div>
    <div style="text-align: center; padding: 20px;">
        <h2 style="margin: 0 0 10px 0;">Limpiando Caché...</h2>
        <p style="color: #94a3b8; font-size: 14px;">Estamos forzando la descarga de la nueva versión.<br>Serás
            redirigido en un momento.</p>
    </div>
    <script>
        console.log("NUCLEAR NUKE: Initiating factory reset...");
        
        // 1. Clear All Storage
        localStorage.clear();
        sessionStorage.clear();
        console.log("Storage cleared.");

        // 2. Unregister ALL Service Workers
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
                for (let reg of regs) {
                    reg.unregister();
                    console.log("SW unregistered:", reg.scope);
                }
            });
        }

        // 3. Clear ALL Caches
        if ('caches' in window) {
            caches.keys().then(function(names) {
                for (let name of names) {
                    caches.delete(name);
                    console.log("Cache deleted:", name);
                }
            });
        }

        // 4. Clear IndexedDB (SICA uses Dexie)
        if (window.indexedDB) {
            indexedDB.databases().then(dbs => {
                dbs.forEach(db => {
                    if (db.name) indexedDB.deleteDatabase(db.name);
                });
            });
        }

        // 5. Final Redirect with brutal cache-busting
        setTimeout(function () {
            const forceUrl = window.location.origin + "/?nuke=" + Date.now() + "&v=202";
            console.log("Redirecting to:", forceUrl);
            window.location.replace(forceUrl);
        }, 2000);
    </script>
</body>

</html>
